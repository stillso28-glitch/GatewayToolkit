<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 110" fill="none">
  <!-- Gate icon -->
  <g transform="translate(4,6)">
    <!-- Outer arch -->
    <path d="M4,96 L4,44 C4,17 19,4 50,4 C81,4 96,17 96,44 L96,96" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Inner arch -->
    <path d="M17,96 L17,47 C17,27 29,16 50,16 C71,16 83,27 83,47 L83,96" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Vertical bars -->
    <line x1="31" y1="22" x2="31" y2="96" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="41" y1="10" x2="41" y2="96" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="50" y1="5" x2="50" y2="96" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="59" y1="10" x2="59" y2="96" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="69" y1="22" x2="69" y2="96" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Base platform -->
    <line x1="0" y1="96" x2="100" y2="96" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Side wings -->
    <line x1="0" y1="78" x2="17" y2="78" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="83" y1="78" x2="100" y2="78" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <!-- G medallion -->
    <circle cx="50" cy="52" r="11.5" stroke="white" stroke-width="2"/>
    <text x="50" y="57.5" text-anchor="middle" fill="white" font-family="Georgia,serif" font-size="13" font-weight="700">G</text>
  </g>
  <!-- Wordmark -->
  <text x="118" y="66" fill="white" font-family="'EB Garamond','Cormorant Garamond',Georgia,serif" font-size="54" font-weight="600" letter-spacing="3">GATEWAY</text>
  <text x="120" y="88" fill="white" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="13.5" font-weight="500" letter-spacing="7">REAL ESTATE ADVISORS</text>
</svg>
